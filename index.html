<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Woyzeck – Sprich mit den Figuren</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Georgia', serif; background: #0d0a06; color: #e2d5b8; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
  .header { width: 100%; background: #1a1208; padding: 1.6rem 1.2rem 1.2rem; text-align: center; border-bottom: 1px solid #2e2416; }
  .header-eyebrow { font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase; color: #c9a84c; margin-bottom: 0.5rem; }
  .header h1 { font-size: 2rem; font-weight: normal; color: #c9a84c; margin-bottom: 0.3rem; }
  .header p { font-size: 0.82rem; color: #7a6e58; font-style: italic; }
  .char-scroll-wrapper { width: 100%; overflow-x: auto; background: #150f07; border-bottom: 1px solid #2e2416; padding: 0.8rem 1rem; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  .char-scroll-wrapper::-webkit-scrollbar { display: none; }
  .char-list { display: flex; gap: 0.6rem; width: max-content; }
  .char-card { display: flex; align-items: center; gap: 0.65rem; padding: 0.55rem 1rem 0.55rem 0.55rem; border-radius: 50px; border: 1px solid #2e2416; background: #1a1208; cursor: pointer; transition: all 0.2s; white-space: nowrap; user-select: none; }
  .char-card:hover { border-color: #c9a84c55; }
  .char-card.active { border-color: #c9a84c; background: #241c0a; }
  .char-avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; font-weight: bold; flex-shrink: 0; position: relative; }
  .char-avatar .dot { position: absolute; top: 1px; right: 1px; width: 9px; height: 9px; border-radius: 50%; border: 1.5px solid #150f07; }
  .char-info { display: flex; flex-direction: column; line-height: 1.3; }
  .char-name-label { font-size: 0.88rem; color: #e2d5b8; font-weight: bold; }
  .char-role-label { font-size: 0.68rem; color: #7a6e58; }
  .tabs { width: 100%; max-width: 680px; display: flex; border-bottom: 1px solid #2e2416; background: #150f07; }
  .tab-btn { flex: 1; padding: 0.9rem; font-family: 'Georgia', serif; font-size: 0.85rem; color: #7a6e58; background: transparent; border: none; border-bottom: 2px solid transparent; cursor: pointer; transition: all 0.15s; letter-spacing: 0.04em; }
  .tab-btn.active { color: #c9a84c; border-bottom-color: #c9a84c; }
  .content { width: 100%; max-width: 680px; flex: 1; display: flex; flex-direction: column; }
  .q-panel { padding: 1rem; display: none; flex-direction: column; gap: 0.5rem; }
  .q-panel.visible { display: flex; }
  .q-chips { display: flex; flex-wrap: wrap; gap: 0.5rem; }
  .q-chip { font-family: 'Georgia', serif; font-size: 0.82rem; font-style: italic; padding: 6px 14px; border-radius: 50px; border: 1px solid #2e2416; background: #1a1208; color: #b8a880; cursor: pointer; transition: all 0.15s; }
  .q-chip:hover { border-color: #c9a84c77; color: #c9a84c; background: #1e1810; }
  .chat-panel { display: none; flex-direction: column; flex: 1; }
  .chat-panel.visible { display: flex; }
  #chatContainer { flex: 1; display: flex; flex-direction: column; }
  .chat-box { flex: 1; min-height: 300px; max-height: 460px; overflow-y: auto; padding: 1.1rem; display: flex; flex-direction: column; gap: 14px; scroll-behavior: smooth; }
  .chat-box::-webkit-scrollbar { width: 3px; }
  .chat-box::-webkit-scrollbar-thumb { background: #2e2416; border-radius: 2px; }
  .chat-placeholder { text-align: center; font-style: italic; font-size: 0.85rem; color: #3a3020; padding: 3rem 2rem; line-height: 1.9; }
  .msg { display: flex; gap: 9px; align-items: flex-start; }
  .msg.user { flex-direction: row-reverse; }
  .msg-avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: bold; flex-shrink: 0; }
  .msg-body { display: flex; flex-direction: column; max-width: 80%; }
  .msg-sender { font-size: 0.68rem; letter-spacing: 0.08em; text-transform: uppercase; color: #5a5040; margin-bottom: 3px; }
  .msg.user .msg-sender { text-align: right; }
  .msg-bubble { padding: 9px 13px; font-size: 0.87rem; line-height: 1.75; border-radius: 4px; border: 1px solid #2e2416; }
  .msg.char .msg-bubble { background: #1a1610; color: #d4c8aa; }
  .msg.user .msg-bubble { background: #150f07; color: #7a6e58; font-style: italic; border-color: #1e1810; }
  .loading-dots { display: flex; gap: 4px; align-items: center; padding: 6px 0; }
  .loading-dots span { width: 5px; height: 5px; border-radius: 50%; background: #5a5040; animation: blink 1.3s infinite; }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:0.15} 40%{opacity:1} }
  .input-bar { display: flex; gap: 8px; padding: 0.85rem 1rem; border-top: 1px solid #2e2416; background: #150f07; }
  .input-bar input { flex: 1; background: #1a1208; border: 1px solid #2e2416; color: #d4c8aa; font-family: 'Georgia', serif; font-size: 0.87rem; font-style: italic; padding: 9px 13px; border-radius: 50px; outline: none; }
  .input-bar input::placeholder { color: #3a3020; }
  .input-bar input:focus { border-color: #c9a84c55; }
  .send-btn { width: 40px; height: 40px; border-radius: 50%; border: 1px solid #c9a84c66; background: transparent; color: #c9a84c; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .send-btn:hover { background: #c9a84c22; border-color: #c9a84c; }
  .send-btn:disabled { opacity: 0.25; cursor: not-allowed; }
  footer { width: 100%; padding: 0.8rem; text-align: center; font-size: 0.68rem; color: #2e2416; font-style: italic; background: #0d0a06; border-top: 1px solid #1a1208; }
</style>
</head>
<body>
<div class="header">
  <div class="header-eyebrow">Georg Büchner · 1837</div>
  <h1>Sprich mit den Figuren</h1>
  <p>Stelle Fragen zur Geschichte und zur Dramentheorie</p>
</div>
<div class="char-scroll-wrapper">
  <div class="char-list" id="charList"></div>
</div>
<div class="tabs">
  <button class="tab-btn active" id="tabGesprach" onclick="switchTab('gesprach')">Gespräch</button>
  <button class="tab-btn" id="tabTheorie" onclick="switchTab('theorie')">Dramentheorie-Fragen</button>
</div>
<div class="content">
  <div class="chat-panel visible" id="panelGesprach">
    <div id="chatContainer"></div>
    <div class="input-bar">
      <input type="text" id="userInput" placeholder="Schreib deine Frage an Woyzeck …" />
      <button class="send-btn" id="sendBtn">&#10148;</button>
    </div>
  </div>
  <div class="q-panel" id="panelTheorie">
    <div class="q-chips" id="qTheorieChips"></div>
  </div>
</div>
<footer>KI-generierte Antworten im Stil der Figuren. Kein historisch verbürgtes Zitat.</footer>
<script>
const CHARS = {
  woyzeck: {
    name:"Woyzeck",role:"Protagonist",initials:"W",avatarBg:"#2a3a5a",avatarColor:"#7ab0e8",dotColor:null,
    system:`Du bist Franz Woyzeck aus Georg Büchners Drama "Woyzeck" (Fragment, 1836/37). Du bist ein einfacher Soldat – arm, gequält, innerlich zerrissen. Du hörst Stimmen. Du siehst Zeichen im Gras, im Feuer, am Himmel. Du liebst Marie tief und aufrichtig, aber Eifersucht und Wahnsinn fressen dich auf. Du sprichst DIREKT mit der Person die dir schreibt – als wäre sie bei dir, in deiner Welt. Rede sie mit "du" an. Sprache: kurze, abgehackte Sätze. Keine Bildungssprache. Antworte IMMER auf Deutsch. Maximal 5 Sätze. Bleib vollständig in der Rolle.`,
    qTheorie:["Bist du ein tragischer Held?","Warum ist dein Leben so fragmentarisch?","Gibt es in deiner Welt Katharsis?","Wer trägt die Schuld – du oder die Gesellschaft?","Büchner zeigt dich als Opfer sozialer Verhältnisse. Siehst du das auch so?","Was bedeutet das offene Drama für dich?","Warum hat dein Stück kein richtiges Ende?"],
    qGesprach:["Wie geht es dir, Woyzeck?","Was denkst du über Marie?","Hörst du die Stimmen?","Was ist der schlimmste Moment in deinem Leben?","Was bedeutet Armut für dich?","Wann hat sich alles verändert?"]
  },
  marie: {
    name:"Marie",role:"Weibliche Hauptfigur",initials:"M",avatarBg:"#5a2a3a",avatarColor:"#e87aaa",dotColor:null,
    system:`Du bist Marie aus Georg Büchners Drama "Woyzeck". Du bist eine junge, sinnliche Frau aus dem einfachen Volk. Du hast ein uneheliches Kind. Du liebst Woyzeck auf deine Weise, lässt dich aber vom prunkvollen Tambourmajor verführen. Du weißt, dass du sündigst – und kannst nicht aufhören. Du sprichst DIREKT mit der Person die dir schreibt – rede sie mit "du" an. Sprache: direkt, emotional, mal kokett, mal schuldbewusst. Antworte IMMER auf Deutsch. Maximal 5 Sätze. Bleib vollständig in der Rolle.`,
    qTheorie:["Bist du eine tragische Figur?","Warum muss du sterben?","Du bist Opfer und Täterin zugleich – was sagst du dazu?","Was ist Schuld im Drama?","Gibt es für dich Katharsis?","Was unterscheidet dich von Gretchen im Faust?","Hättest du eine andere Wahl gehabt?"],
    qGesprach:["Liebst du Woyzeck wirklich?","Warum hast du dich dem Tambourmajor hingegeben?","Hast du Angst vor dem, was kommt?","Was wünschst du dir für dein Kind?","Bist du glücklich?","Was bedeutet dir Schönheit?"]
  },
  hauptmann: {
    name:"Hauptmann",role:"Antagonist",initials:"H",avatarBg:"#3a3010",avatarColor:"#c9b84c",dotColor:"#c9a84c",
    system:`Du bist der Hauptmann aus Georg Büchners Drama "Woyzeck". Du bist ein nervöser, geschwätziger Offizier mittleren Alters. Du redest viel über Moral und Tugend, hast aber selbst keine. Du hast Angst vor der Zeit, vor dem Tod. Du sprichst DIREKT mit der Person die dir schreibt – rede sie mit "Sie" an, gönnerhaft und herablassend. Sprache: langsam, weitschweifig, selbstgefällig. Antworte IMMER auf Deutsch. Maximal 5 Sätze. Bleib vollständig in der Rolle.`,
    qTheorie:["Was ist ein Drama, Herr Hauptmann?","Sind Sie eine komische oder tragische Figur?","Was bedeutet Moral im Drama?","Büchner macht Sie zur Verkörperung der Doppelmoral. Was sagen Sie?","Was ist der Unterschied zwischen Volksstück und klassischem Drama?","Glauben Sie an poetische Gerechtigkeit?","Was ist die Funktion des Dramas?"],
    qGesprach:["Was denken Sie über Woyzeck?","Was bedeutet Tugend für Sie?","Wovor haben Sie Angst?","Sind Sie ein guter Mensch?","Wie verbringen Sie Ihre Zeit?","Was halten Sie von der modernen Zeit?"]
  },
  doktor: {
    name:"Doktor",role:"Antagonist",initials:"D",avatarBg:"#0e2e0e",avatarColor:"#7ac97a",dotColor:null,
    system:`Du bist der Doktor aus Georg Büchners Drama "Woyzeck". Du bist ein fanatischer Wissenschaftler. Woyzeck ist für dich ein Versuchsobjekt. Du glaubst an die Allmacht der Wissenschaft. Du sprichst DIREKT mit der Person die dir schreibt – rede sie mit "Sie" an, kalt und herablassend, als wäre sie ein weiteres Versuchsobjekt. Sprache: pseudowissenschaftlich, kalt, manchmal ekstatisch. Antworte IMMER auf Deutsch. Maximal 5 Sätze. Bleib vollständig in der Rolle.`,
    qTheorie:["Was ist ein Drama aus wissenschaftlicher Sicht?","Ist Woyzeck ein klinischer Fall oder eine tragische Figur?","Büchner kritisiert durch Sie den Wissenschaftsglauben. Was sagen Sie?","Kann man Dramentheorie empirisch beweisen?","Was unterscheidet das Sturm-und-Drang-Drama von Büchners offenem Drama?","Welche Funktion haben Figuren wie Sie im Sozialdrama?","Was ist die Idee des Dramas – Hegel oder Büchner?"],
    qGesprach:["Was ist Woyzeck für Sie?","Was beweisen Ihre Experimente?","Haben Sie ein Gewissen?","Was ist der Mensch – wissenschaftlich gesehen?","Was sind Ihre neuesten Erkenntnisse?","Warum brauchen Sie Woyzeck?"]
  },
  tambourmajor: {
    name:"Tambourmajor",role:"Antagonist",initials:"T",avatarBg:"#2e1e08",avatarColor:"#d4884c",dotColor:null,
    system:`Du bist der Tambourmajor aus Georg Büchners Drama "Woyzeck". Du bist ein stattlicher, selbstverliebter Soldat. Du bist stolz auf deinen Körper, deine Männlichkeit. Du hast Marie verführt. Kein Funken Mitgefühl. Du sprichst DIREKT mit der Person die dir schreibt – rede sie mit "du" an, lässig und überheblich. Sprache: laut, prahlerisch, derb, simpel. Antworte IMMER auf Deutsch. Maximal 5 Sätze. Bleib vollständig in der Rolle.`,
    qTheorie:["Was ist ein Held im Drama?","Bist du ein Antagonist?","Was ist Theater überhaupt?","Büchner benutzt dich um Macht und Körper zu zeigen. Was sagst du?","Was ist der Unterschied zwischen einem Helden und einem Sieger?","Kann ein Prahlhans eine tragische Figur sein?","Warum hat das Stück kein gutes Ende für dich?"],
    qGesprach:["Was denkst du über Marie?","Was denkst du über Woyzeck?","Bist du ein guter Mensch?","Was macht dich besonders?","Bist du der Stärkste hier?","Was willst du vom Leben?"]
  },
  andres: {
    name:"Andres",role:"Nebenfigur",initials:"A",avatarBg:"#0e2424",avatarColor:"#7ac9b8",dotColor:null,
    system:`Du bist Andres aus Georg Büchners Drama "Woyzeck". Du bist Woyzecks Kamerad – gutmütig, bodenständig, unbedarft. Du verstehst Woyzecks Not nicht wirklich, weichst ihr aus, singst lieber ein Lied. Du sprichst DIREKT mit der Person die dir schreibt – rede sie mit "du" an, freundlich und unkompliziert. Sprache: schlicht, volkstümlich, manchmal singst du spontan. Antworte IMMER auf Deutsch. Maximal 5 Sätze. Bleib vollständig in der Rolle.`,
    qTheorie:["Was ist ein Volksstück?","Bist du eine Nebenfigur – und was bedeutet das?","Was ist Freundschaft im Drama?","Welche Funktion haben einfache Figuren in einem Trauerspiel?","Büchner zeigt durch dich die Gleichgültigkeit der Gesellschaft. Weißt du das?","Was unterscheidet einen Helden von einem Zuschauer?","Kann jemand schuldig sein, ohne etwas getan zu haben?"],
    qGesprach:["Was denkst du über Woyzeck?","Hast du seine Not gespürt?","Warum hast du ihm nicht geholfen?","Sing uns etwas.","Was machst du in deiner Freizeit?","Bist du zufrieden mit deinem Leben?"]
  }
};
const charOrder=["woyzeck","marie","hauptmann","doktor","tambourmajor","andres"];
let currentChar="woyzeck",activeTab="gesprach";
const histories={},chatDOMs={};
function addMsg(role,text,charKey){const key=charKey||currentChar;const box=chatDOMs[key];const ph=box.querySelector(".chat-placeholder");if(ph)ph.remove();const c=CHARS[key];const div=document.createElement("div");div.className="msg "+role;const avatar=document.createElement("div");avatar.className="msg-avatar";avatar.style.background=role==="user"?"#1e1810":c.avatarBg;avatar.style.color=role==="user"?"#5a5040":c.avatarColor;avatar.textContent=role==="user"?"Du":c.initials;const body=document.createElement("div");body.className="msg-body";const sender=document.createElement("div");sender.className="msg-sender";sender.textContent=role==="user"?"Du":c.name;const bubble=document.createElement("div");bubble.className="msg-bubble";bubble.textContent=text;body.appendChild(sender);body.appendChild(bubble);div.appendChild(avatar);div.appendChild(body);box.appendChild(div);box.scrollTop=99999;}
function addLoading(){const box=chatDOMs[currentChar];const c=CHARS[currentChar];const div=document.createElement("div");div.className="msg char";div.id="loadingMsg";const avatar=document.createElement("div");avatar.className="msg-avatar";avatar.style.background=c.avatarBg;avatar.style.color=c.avatarColor;avatar.textContent=c.initials;const body=document.createElement("div");body.className="msg-body";const sender=document.createElement("div");sender.className="msg-sender";sender.textContent=c.name;const dots=document.createElement("div");dots.className="loading-dots";dots.innerHTML="<span></span><span></span><span></span>";body.appendChild(sender);body.appendChild(dots);div.appendChild(avatar);div.appendChild(body);box.appendChild(div);box.scrollTop=99999;}
function renderTheorieChips(){const container=document.getElementById("qTheorieChips");if(!container)return;container.innerHTML="";CHARS[currentChar].qTheorie.forEach(q=>{const btn=document.createElement("button");btn.className="q-chip";btn.textContent=q;btn.onclick=()=>{switchTab("gesprach");document.getElementById("userInput").value=q;sendMessage();};container.appendChild(btn);});}
function switchTab(tab){activeTab=tab;document.getElementById("tabGesprach").classList.toggle("active",tab==="gesprach");document.getElementById("tabTheorie").classList.toggle("active",tab==="theorie");document.getElementById("panelGesprach").classList.toggle("visible",tab==="gesprach");document.getElementById("panelTheorie").classList.toggle("visible",tab==="theorie");}
function selectChar(key){currentChar=key;document.querySelectorAll(".char-card").forEach(c=>c.classList.toggle("active",c.dataset.char===key));charOrder.forEach(k=>{chatDOMs[k].style.display=k===key?"flex":"none";});renderTheorieChips();document.getElementById("userInput").placeholder="Schreib deine Frage an "+CHARS[key].name+" \u2026";}
async function sendMessage(){const input=document.getElementById("userInput");const sendBtn=document.getElementById("sendBtn");const text=input.value.trim();if(!text||sendBtn.disabled)return;input.value="";sendBtn.disabled=true;switchTab("gesprach");addMsg("user",text);histories[currentChar].push({role:"user",content:text});addLoading();const activeKey=currentChar;try{const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,system:CHARS[activeKey].system,messages:histories[activeKey]})});const data=await res.json();const reply=(data.content||[]).map(b=>b.text||"").join("").trim();document.getElementById("loadingMsg")?.remove();histories[activeKey].push({role:"assistant",content:reply});addMsg("char",reply||"\u2026",activeKey);}catch(e){document.getElementById("loadingMsg")?.remove();addMsg("char","\u2026(Stille)\u2026",activeKey);}sendBtn.disabled=false;}
document.addEventListener("DOMContentLoaded",()=>{const container=document.getElementById("chatContainer");charOrder.forEach(key=>{histories[key]=[];const box=document.createElement("div");box.className="chat-box";box.style.display=key==="woyzeck"?"flex":"none";box.innerHTML='<div class="chat-placeholder">Stelle '+CHARS[key].name+' eine Frage\u2026</div>';chatDOMs[key]=box;container.appendChild(box);});const charList=document.getElementById("charList");charOrder.forEach(key=>{const c=CHARS[key];const card=document.createElement("div");card.className="char-card"+(key==="woyzeck"?" active":"");card.dataset.char=key;card.innerHTML='<div class="char-avatar" style="background:'+c.avatarBg+';color:'+c.avatarColor+'">'+c.initials+(c.dotColor?'<span class="dot" style="background:'+c.dotColor+'"></span>':'')+'</div><div class="char-info"><span class="char-name-label">'+c.name+'</span><span class="char-role-label">'+c.role+'</span></div>';card.addEventListener("click",()=>selectChar(key));charList.appendChild(card);});renderTheorieChips();document.getElementById("sendBtn").addEventListener("click",sendMessage);document.getElementById("userInput").addEventListener("keydown",e=>{if(e.key==="Enter")sendMessage();});});
</script>
</body>
</html>
